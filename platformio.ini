; PlatformIO Project Configuration File
; Exocortex ESP32 Sensor Node

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; WiFi and cortex config — edit these or use secrets
build_flags =
  -DWIFI_SSID=\"YOUR_SSID\"
  -DWIFI_PASS=\"YOUR_PASSWORD\"
  -DCORTEX_URL=\"http://192.168.1.100:9000\"

lib_deps =
linklib = stdc++
